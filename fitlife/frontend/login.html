<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – FitLife</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card slide-up">

      <a href="/" class="auth-logo">FitLife<span>.</span></a>
      <p class="auth-subtitle">Welcome back! Sign in to continue your journey.</p>

      <div id="alertBox"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="you@example.com"
            autocomplete="email"
          />
          <div class="form-error hidden" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <div class="form-error hidden" id="passwordError"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>

    </div>
  </div>

  <script type="module" src="js/auth.js"></script>

</body>
</html>
