<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – FitLife</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/dashboard" class="nav-logo">FitLife<span class="logo-dot"></span></a>
      <div class="nav-links">
        <a href="/dashboard" class="active nav-hide">Dashboard</a>
        <a href="/ai" class="nav-hide">AI Coach</a>
        <a href="/chat" class="nav-hide">Chat</a>
        <span id="navUser" style="color: var(--slate-600); font-size: 0.9rem; font-weight: 600;"></span>
        <button onclick="logout()" class="btn btn-ghost btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Dashboard -->
  <main class="dashboard-layout">

    <!-- Header -->
    <div class="dashboard-header slide-up">
      <h2>Good <span id="timeGreet">day</span>, <span id="userName">Athlete</span>! 👋</h2>
      <p>Here's an overview of your fitness progress.</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid slide-up" id="statsGrid">
      <div class="stat-card">
        <div class="stat-icon green">🏋️</div>
        <div>
          <div class="stat-value" id="statSessions">0</div>
          <div class="stat-label">Total Sessions</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">🔥</div>
        <div>
          <div class="stat-value" id="statCalories">0</div>
          <div class="stat-label">Calories Burned</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">⏱️</div>
        <div>
          <div class="stat-value" id="statDuration">0</div>
          <div class="stat-label">Minutes Trained</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple">🤖</div>
        <div>
          <div class="stat-value">AI</div>
          <div class="stat-label"><a href="/ai" style="color: var(--accent);">Get Plan</a></div>
        </div>
      </div>
    </div>

    <!-- Workouts Section -->
    <div class="card">
      <div class="section-header">
        <h3>My Workouts</h3>
        <button class="btn btn-primary btn-sm" id="addWorkoutBtn">+ Add Workout</button>
      </div>

      <div id="alertBox"></div>

      <!-- Workout List -->
      <div id="workoutList">
        <div class="page-loader"><div class="loader"></div></div>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>
    </div>

  </main>

  <!-- Add / Edit Workout Modal -->
  <div class="modal-overlay" id="workoutModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Workout</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>

      <form id="workoutForm" novalidate>
        <input type="hidden" id="workoutId" />

        <div class="form-group">
          <label class="form-label">Workout Title</label>
          <input type="text" id="wTitle" class="form-control" placeholder="e.g. Morning Run" />
          <div class="form-error hidden" id="wTitleError"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Type</label>
            <select id="wType" class="form-control">
              <option value="">Select type</option>
              <option>Cardio</option>
              <option>Strength</option>
              <option>Flexibility</option>
              <option>HIIT</option>
              <option>Yoga</option>
              <option>Sports</option>
              <option>Other</option>
            </select>
            <div class="form-error hidden" id="wTypeError"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" id="wDate" class="form-control" />
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Duration (mins)</label>
            <input type="number" id="wDuration" class="form-control" placeholder="30" min="1" />
            <div class="form-error hidden" id="wDurationError"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Calories Burned</label>
            <input type="number" id="wCalories" class="form-control" placeholder="250" min="0" />
            <div class="form-error hidden" id="wCaloriesError"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Notes (optional)</label>
          <textarea id="wNotes" class="form-control" placeholder="How did the workout go?"></textarea>
        </div>

        <div style="display: flex; gap: 0.75rem; justify-content: flex-end;">
          <button type="button" class="btn btn-ghost" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveWorkoutBtn">Save Workout</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
  <script>
    // Logout function (global)
    function logout() {
      localStorage.removeItem('fitlife_token');
      localStorage.removeItem('fitlife_user');
      window.location.href = '/login';
    }
  </script>

</body>
</html>
