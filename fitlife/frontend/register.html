<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – FitLife</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card slide-up">

      <a href="/" class="auth-logo">FitLife<span>.</span></a>
      <p class="auth-subtitle">Create your account and start your fitness journey.</p>

      <div id="alertBox"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="John Doe"
            autocomplete="name"
          />
          <div class="form-error hidden" id="nameError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="you@example.com"
            autocomplete="email"
          />
          <div class="form-error hidden" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Min. 6 characters"
            autocomplete="new-password"
          />
          <div class="form-error hidden" id="passwordError"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label" for="age">Age</label>
            <input type="number" id="age" class="form-control" placeholder="25" min="10" max="100" />
          </div>
          <div class="form-group">
            <label class="form-label" for="goal">Fitness Goal</label>
            <select id="goal" class="form-control">
              <option value="">Select goal</option>
              <option value="lose_weight">Lose Weight</option>
              <option value="build_muscle">Build Muscle</option>
              <option value="improve_endurance">Improve Endurance</option>
              <option value="stay_healthy">Stay Healthy</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
          Create Account
        </button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>

    </div>
  </div>

  <script type="module" src="js/auth.js"></script>

</body>
</html>
