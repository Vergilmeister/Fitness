<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Chat – FitLife</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/dashboard" class="nav-logo">FitLife<span class="logo-dot"></span></a>
      <div class="nav-links">
        <a href="/dashboard" class="nav-hide">Dashboard</a>
        <a href="/ai" class="nav-hide">AI Coach</a>
        <a href="/chat" class="active nav-hide">Chat</a>
        <button onclick="logout()" class="btn btn-ghost btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Join Screen (shown before entering chat) -->
  <div id="joinScreen" class="auth-page" style="min-height: calc(100vh - 68px);">
    <div class="auth-card slide-up">
      <div class="auth-logo">Community Chat 💬</div>
      <p class="auth-subtitle">Join a room and connect with fellow fitness enthusiasts.</p>

      <div class="form-group">
        <label class="form-label">Display Name</label>
        <input type="text" id="joinName" class="form-control" placeholder="Your nickname" />
        <div class="form-error hidden" id="joinNameError"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Choose Room</label>
        <select id="joinRoom" class="form-control">
          <option value="general">💬 General</option>
          <option value="workouts">🏋️ Workouts</option>
          <option value="nutrition">🥗 Nutrition</option>
          <option value="motivation">🔥 Motivation</option>
          <option value="beginners">🌱 Beginners</option>
        </select>
      </div>

      <button class="btn btn-primary btn-full" id="joinBtn">Join Chat Room →</button>
    </div>
  </div>

  <!-- Chat Interface (hidden until joined) -->
  <div id="chatScreen" class="hidden">
    <div class="chat-layout">

      <!-- Sidebar: Rooms -->
      <div class="chat-sidebar">
        <h3>Rooms</h3>
        <button class="room-btn active" data-room="general">💬 General</button>
        <button class="room-btn" data-room="workouts">🏋️ Workouts</button>
        <button class="room-btn" data-room="nutrition">🥗 Nutrition</button>
        <button class="room-btn" data-room="motivation">🔥 Motivation</button>
        <button class="room-btn" data-room="beginners">🌱 Beginners</button>

        <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--slate-100);">
          <div style="font-size: 0.8rem; color: var(--slate-500);">Chatting as</div>
          <div style="font-weight: 600; color: var(--slate-700); font-size: 0.9rem;" id="sidebarUsername"></div>
        </div>
      </div>

      <!-- Main Chat -->
      <div class="chat-main">
        <div class="chat-header">
          <div>
            <h3 id="chatRoomName">💬 General</h3>
          </div>
          <span class="online-badge" id="onlineBadge">0 online</span>
        </div>

        <div class="chat-messages" id="chatMessages">
          <!-- Messages appear here -->
        </div>

        <div class="typing-indicator" id="typingIndicator"></div>

        <div class="chat-input-area">
          <textarea
            id="messageInput"
            class="form-control"
            placeholder="Type a message..."
            rows="1"
          ></textarea>
          <button class="btn btn-primary" id="sendBtn">Send</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Socket.IO from CDN -->
  <script src="https://cdn.socket.io/4.7.1/socket.io.min.js"></script>
  <script type="module" src="js/chat.js"></script>
  <script>
    function logout() {
      localStorage.removeItem('fitlife_token');
      localStorage.removeItem('fitlife_user');
      window.location.href = '/login';
    }
  </script>

</body>
</html>
